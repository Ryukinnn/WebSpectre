# WebSpectre Global Configuration
# Developer: Ryukinnn
# Version: 1.0.0

app:
  name: "WebSpectre"
  version: "1.0.0"
  language: "id"
  theme: "dark"
  log_level: "INFO"

performance:
  max_threads: 20
  timeout: 30
  async_mode: true

reporting:
  default_format: "html"
  save_directory: "reports/"

network:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 WebSpectre/1.0"
  verify_ssl: false
  follow_redirects: true
  max_retries: 3
